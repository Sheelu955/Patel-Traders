<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Patel Traders | India's Unified Gateway</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --saffron-soft: #fff9f2;
            --saffron-main: #ff9933;
            --saffron-deep: #e67e22;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #ffffff, var(--saffron-soft));
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ☸️ Rotating Ashoka Chakra */
        .chakra-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vh;
            height: 85vh;
            opacity: 0.03;
            z-index: -1;
            pointer-events: none;
            animation: rotateChakra 80s linear infinite;
        }

        @keyframes rotateChakra {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 💎 Vault Buttons Style */
        .vault-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 153, 51, 0.15);
            border-radius: 30px;
            padding: 24px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 165px;
            cursor: pointer;
            position: relative;
        }

        .vault-btn:hover {
            background: #ffffff;
            border-color: var(--saffron-main);
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(255, 153, 51, 0.15);
        }

        .upcoming-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff9933;
            color: white;
            font-size: 8px;
            padding: 4px 8px;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* 🤖 Floating Chatbot Button */
        .chat-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #ff9933, #e67e22);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 15px 35px rgba(255, 153, 51, 0.4);
            cursor: pointer;
            z-index: 1000;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid white;
        }

        .chat-fab:hover { transform: scale(1.1) rotate(5deg); }

        /* 📱 Chat Popup Window */
        .chat-popup {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 380px;
            height: 600px;
            max-height: 80vh;
            background: white;
            border-radius: 35px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            z-index: 999;
            overflow: hidden;
            display: none;
            border: 2px solid #ff9933;
        }

        #disclaimerModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 35px;
            padding: 40px;
            text-align: center;
            border: 2px solid var(--saffron-main);
        }

        .scroll-active { overflow-y: auto !important; }
    </style>
</head>
<body>

    <svg class="chakra-bg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="0.3"/>
        <circle cx="50" cy="50" r="8" fill="none" stroke="currentColor" stroke-width="0.3"/>
        <script>
            for(let i=0; i<24; i++) {
                const angle = i * 15 * Math.PI / 180;
                document.write(`<line x1="50" y1="50" x2="${50 + 40 * Math.cos(angle)}" y2="${50 + 40 * Math.sin(angle)}" stroke="currentColor" stroke-width="0.3" />`);
            }
        </script>
    </svg>

    <div id="welcomeScreen" class="text-center px-6 relative z-10">
        <div class="mb-10">
            <img src="https://i.ibb.co/C30Ybjck/PT-20250224-170650-0000.png" class="w-32 h-32 mx-auto rounded-[40px] shadow-2xl">
        </div>
        <h1 class="text-6xl md:text-8xl font-black italic uppercase leading-[1] mb-6 tracking-tighter">
            Welcome To <span class="text-orange-500">Patel Traders</span>
        </h1>
        <button onclick="startPortal()" class="bg-orange-500 text-white font-bold py-5 px-12 rounded-full text-xl shadow-xl uppercase tracking-widest hover:bg-orange-600 transition-all">Get Started →</button>
    </div>

    <div id="selectionScreen" class="hidden w-full max-w-[600px] px-6 text-center relative z-10 py-10">
        <div class="mb-10">
            <h3 class="text-3xl font-black italic uppercase tracking-tight">Main Dashboard</h3>
            <div class="h-[3px] w-12 bg-orange-500 mx-auto mt-4 rounded-full"></div>
        </div>

        <div class="grid grid-cols-2 gap-5">
            <div onclick="openModal('admin')" class="vault-btn">
                <img src="https://i.ibb.co/JwnkKFyV/business-user-shield-78370-7029.webp" class="w-14 h-14 mb-4">
                <h3 class="text-[12px] font-extrabold tracking-widest uppercase">Admin Vault</h3>
            </div>
            
            <div onclick="openModal('cms')" class="vault-btn">
                <div class="text-4xl mb-4">📢</div>
                <h3 class="text-[12px] font-extrabold tracking-widest uppercase">CMS Portal</h3>
            </div>

            <div onclick="openModal('customer')" class="vault-btn">
                <div class="text-4xl mb-4">👤</div>
                <h3 class="text-[12px] font-extrabold tracking-widest uppercase">User Vault</h3>
            </div>

            <a href="https://sheelu955.github.io/About-Patel-Traders-/" class="vault-btn">
                <div class="text-4xl mb-4">🏢</div>
                <h3 class="text-[12px] font-extrabold tracking-widest uppercase">About Us</h3>
            </a>

            <div onclick="openModal('upcoming')" class="vault-btn border-orange-200 bg-orange-50/30">
                <span class="upcoming-tag">Upcoming</span>
                <div class="text-4xl mb-4">🛍️</div>
                <h3 class="text-[12px] font-extrabold tracking-widest uppercase">Online Store</h3>
            </div>

            <div onclick="openModal('policies')" class="vault-btn">
                <div class="text-4xl mb-4">⚖️</div>
                <h3 class="text-[12px] font-extrabold tracking-widest uppercase">Policy Hub</h3>
            </div>
        </div>

        <footer class="mt-16 text-center opacity-60">
            <p class="text-[10px] font-black text-orange-700 tracking-[3px] uppercase">Official AI Developed by Patel Traders</p>
            <p class="text-[9px] font-bold uppercase tracking-[2px] mt-2">Copyright 2026 | तालग्राम, गांधीनगर</p>
        </footer>
    </div>

    <div id="chatButton" class="chat-fab hidden" onclick="toggleChat()">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>

    <div id="chatWindow" class="chat-popup">
        <div style="background: #ff9933; padding: 15px; color: white; display: flex; justify-content: space-between;">
            <span class="font-black text-xs uppercase tracking-widest">PT GOMINI AI</span>
            <button onclick="toggleChat()" class="font-bold">×</button>
        </div>
        <iframe src="https://sheelu955.github.io/AI/" style="width: 100%; height: calc(100% - 50px); border: none;"></iframe>
    </div>

    <div id="disclaimerModal">
        <div class="modal-content">
            <h2 id="mTitle" class="text-xl font-black text-orange-700 uppercase tracking-widest mb-4">DISCLAIMER</h2>
            <p id="mText" class="text-sm text-gray-600 font-bold mb-8"></p>
            <div class="flex flex-col gap-3">
                <button id="mContinue" class="bg-orange-500 text-white py-3 rounded-full font-black text-xs uppercase">Continue</button>
                <button onclick="closeModal()" class="border-2 py-3 rounded-full font-black text-xs uppercase text-gray-400">Back</button>
            </div>
        </div>
    </div>

    <script>
        function startPortal() {
            localStorage.setItem('pt_started', 'true'); // Save state to Cache
            document.getElementById('welcomeScreen').style.display = "none";
            document.getElementById('selectionScreen').classList.remove('hidden');
            document.getElementById('chatButton').classList.remove('hidden');
            document.body.classList.add('scroll-active');
        }

        function toggleChat() {
            const chat = document.getElementById('chatWindow');
            chat.style.display = (chat.style.display === 'block') ? 'none' : 'block';
        }

        function openModal(type) {
            const modal = document.getElementById('disclaimerModal');
            const text = document.getElementById('mText');
            const btn = document.getElementById('mContinue');
            const title = document.getElementById('mTitle');
            let target = "";

            btn.style.display = "block";
            title.innerText = "DISCLAIMER";

            if(type === 'admin') {
                text.innerText = "Only for Patel Traders Admins. Unauthorized login is illegal.";
                target = "https://sheelu955.github.io/Admin-Gateway/";
            } else if(type === 'cms') {
                text.innerText = "CMS Handling. Unauthorized access is subject to legal action.";
                target = "https://sheelu955.github.io/CMS-COMPLAINT-MANAGEMENT-SYSTEM/";
            } else if(type === 'customer') {
                text.innerText = "Login to User Vault to manage your bills and orders.";
                target = "https://sheelu955.github.io/Customer-Gateway/";
            } else if(type === 'upcoming') {
                title.innerText = "COMING SOON";
                text.innerText = "The Patel Traders Online Store is currently under construction. Stay tuned for 2026 launch!";
                btn.style.display = "none";
            } else if(type === 'policies') {
                title.innerText = "POLICY HUB";
                text.innerHTML = "Refunds: 7-10 Days.<br>No Warranty on Products.<br>No Home Delivery Currently.";
                btn.style.display = "none";
            }
            
            btn.onclick = () => window.location.href = target;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('disclaimerModal').style.display = 'none'; }

        // Load Cache on Window Load
        window.onload = function() {
            if(localStorage.getItem('pt_started') === 'true') {
                startPortal();
            }
        };
    </script>
</body>
</html>
