<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT OS | Ultra Premium Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800;900&display=swap');
        
        :root { 
            --pt-orange: #ff7b00; 
            --pt-gold: #ffb703;
            --pt-magenta: #e81cff;
            --bg-glass: rgba(255, 255, 255, 0.75);
            --surface: #f8fafc;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Custom Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 123, 0, 0.3); border-radius: 10px; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--surface); 
            color: #0f172a; 
            margin: 0; overflow: hidden; 
            height: 100vh; width: 100vw;
            user-select: none;
        }

        /* 🌌 LIQUID AURORA BACKGROUND (Holi Special Glow) */
        .aurora-container {
            position: absolute; inset: 0; z-index: -2;
            overflow: hidden; background: #ffffff;
            filter: blur(80px);
        }
        .aurora-blob {
            position: absolute; border-radius: 50%;
            animation: flow 20s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
            mix-blend-mode: multiply; opacity: 0.4;
        }
        .blob-1 { width: 60vw; height: 60vw; background: var(--pt-orange); top: -20%; left: -10%; animation-delay: 0s; }
        .blob-2 { width: 50vw; height: 50vw; background: var(--pt-gold); bottom: -10%; right: -20%; animation-delay: -5s; }
        .blob-3 { width: 45vw; height: 45vw; background: var(--pt-magenta); top: 30%; left: 40%; animation-delay: -10s; opacity: 0.2; }
        
        /* Mesh Overlay */
        .mesh-overlay {
            position: absolute; inset: 0; z-index: -1; opacity: 0.3;
            background-image: radial-gradient(#000000 1px, transparent 1px);
            background-size: 24px 24px;
        }

        @keyframes flow {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(10%, 15%) scale(1.2) rotate(180deg); }
            100% { transform: translate(-10%, -5%) scale(0.9) rotate(360deg); }
        }

        /* 🖱️ INTELLIGENT CURSOR (PC Only) */
        @media (pointer: fine) {
            #custom-cursor {
                position: fixed; width: 30px; height: 30px; border: 2px solid var(--pt-orange);
                border-radius: 50%; pointer-events: none; z-index: 100000;
                transform: translate(-50%, -50%);
                transition: width 0.2s, height 0.2s, background 0.2s;
            }
            #cursor-dot {
                position: fixed; width: 6px; height: 6px; background: var(--pt-orange);
                border-radius: 50%; pointer-events: none; z-index: 100001;
                transform: translate(-50%, -50%); transition: transform 0.05s linear;
            }
        }

        /* 🚀 BOOT/WELCOME SEQUENCE */
        .welcome-screen { 
            position: absolute; inset: 0; z-index: 9999;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(40px) saturate(200%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; 
            transition: all 1s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .neuro-ring {
            position: absolute; width: 140px; height: 140px; border-radius: 50%;
            border: 2px dashed rgba(255, 123, 0, 0.4);
            animation: spin 10s linear infinite; pointer-events: none;
        }
        .neuro-ring-2 {
            width: 170px; height: 170px; border: 1px solid rgba(232, 28, 255, 0.2);
            animation: spin-reverse 15s linear infinite; border-style: dotted;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        .btn-enter { 
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, var(--pt-orange), #ff4500); 
            color: #ffffff; font-weight: 900; text-transform: uppercase; border-radius: 50px; 
            padding: 18px 50px; cursor: pointer; border: none; 
            box-shadow: 0 10px 40px rgba(255, 123, 0, 0.4), inset 0 2px 0 rgba(255,255,255,0.3); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            letter-spacing: 4px; font-size: 13px; margin-top: 40px;
        }
        .btn-enter::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); animation: shine 3s infinite;
        }
        @keyframes shine { 100% { left: 200%; } }
        .btn-enter:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 20px 50px rgba(255, 123, 0, 0.6); }
        .btn-enter:active { transform: scale(0.95); }

        /* 🛸 DYNAMIC ISLAND 2.0 */
        .dynamic-island-wrapper {
            position: absolute; top: 25px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
            animation: slideDown 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .dynamic-island {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 1);
            padding: 8px 10px 8px 20px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06), inset 0 -2px 10px rgba(0,0,0,0.02);
            pointer-events: auto; transition: all 0.4s ease;
        }

        .clock-net {
            display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
        }
        .live-clock { font-size: 11px; font-weight: 900; letter-spacing: 1px; color: #1e293b; line-height: 1; }
        .net-status { display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        .net-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

        .nav-btn {
            background: transparent; border: none; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #475569; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .nav-btn:hover { background: rgba(255, 123, 0, 0.08); color: var(--pt-orange); transform: scale(1.1); }
        .nav-btn:active { transform: scale(0.9); }

        /* 🔮 MAGNETIC & GYROSCOPE CARDS */
        .home-screen {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 120px 20px 40px 20px; perspective: 2000px; z-index: 10;
        }

        .greeting-text {
            font-size: 14px; font-weight: 900; background: linear-gradient(to right, var(--pt-orange), var(--pt-magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 6px; margin-bottom: 10px;
        }

        .pt-card-wrapper { position: relative; perspective: 1500px; transform-style: preserve-3d; }
        
        .pt-card {
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 35px;
            padding: 40px 25px; text-align: center; cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03), inset 0 2px 0 rgba(255,255,255,1);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            position: relative; overflow: hidden;
            transform-style: preserve-3d; transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s;
            width: 100%; max-width: 320px; margin: 0 auto;
        }
        
        /* Holographic Glare Layer */
        .pt-card::before {
            content: ''; position: absolute; inset: 0; z-index: 1;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 60%);
            opacity: 0; transition: opacity 0.4s ease; mix-blend-mode: overlay; pointer-events: none;
        }
        .pt-card:hover::before { opacity: 1; }
        .pt-card:hover { box-shadow: 0 30px 60px rgba(255, 123, 0, 0.15), 0 0 20px rgba(232, 28, 255, 0.1); border-color: rgba(255, 123, 0, 0.4); }

        /* Floating 3D Elements */
        .card-icon {
            width: 75px; height: 75px; border-radius: 24px; z-index: 2;
            background: linear-gradient(135deg, var(--pt-orange), #ff4500);
            display: flex; align-items: center; justify-content: center; color: white;
            box-shadow: 0 15px 35px rgba(255, 123, 0, 0.4);
            transform: translateZ(50px); transition: transform 0.3s;
        }
        .pt-card:hover .card-icon { transform: translateZ(70px) scale(1.1); }
        
        .card-title { transform: translateZ(30px); z-index: 2; }
        .card-subtitle { transform: translateZ(20px); z-index: 2; }

        /* 🖼️ Iframe OS Engine */
        #browserFrame {
            flex: 1; width: 100%; height: 100%; border: none; display: none;
            background: transparent; opacity: 0; transition: opacity 0.6s ease;
        }

        /* ⚡ Laser Loading Beam */
        #loadingBar {
            position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, transparent, var(--pt-orange), var(--pt-magenta), transparent);
            background-size: 200% 100%; width: 0%; opacity: 0; z-index: 1000;
            box-shadow: 0 0 20px var(--pt-orange);
            transition: width 0.3s ease, opacity 0.3s ease;
        }

        #view-main { display: none; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
        
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="custom-cursor" class="hidden md:block"></div>
    <div id="cursor-dot" class="hidden md:block"></div>

    <div class="aurora-container">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>
    <div class="mesh-overlay"></div>

    <div id="view-welcome" class="welcome-screen">
        <div class="neuro-ring"></div>
        <div class="neuro-ring neuro-ring-2"></div>
        
        <div class="relative z-10 animate-[fadeInDown_1s_ease-out]">
            <div class="relative inline-block mb-6 group">
                <div class="absolute inset-0 bg-[#ff9933] blur-[40px] opacity-40 rounded-full animate-pulse transition-opacity duration-500 group-hover:opacity-70"></div>
                <img src="https://i.ibb.co/C30Ybjck/PT-20250224-170650-0000.png" class="w-36 mx-auto rounded-[45px] shadow-2xl relative z-10 border-2 border-white/80" crossorigin="anonymous">
            </div>
            <h4 class="font-black uppercase tracking-[10px] text-[10px] mb-3 text-slate-500">System <span class="text-[#ff9933]">OS</span> Initialized</h4>
            <h1 class="text-5xl md:text-7xl font-black text-slate-900 uppercase tracking-tighter" style="text-shadow: 0 10px 30px rgba(0,0,0,0.1);">Patel Traders</h1>
            <button onclick="enterSystem()" class="btn-enter">Initialize Matrix</button>
        </div>
    </div>

    <div id="view-main">
        <div id="loadingBar"></div>

        <div class="dynamic-island-wrapper">
            <nav class="dynamic-island">
                <div class="clock-net mr-2 ml-2">
                    <span id="liveClock" class="live-clock">00:00</span>
                    <div class="net-status"><div class="net-dot"></div><span class="text-[7px] text-slate-400 font-bold uppercase tracking-widest">Online</span></div>
                </div>
                
                <div class="h-8 w-[1px] bg-slate-200 mx-1"></div>

                <button class="nav-btn" onclick="triggerHaptic(); goBack()" title="Back">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <button class="nav-btn" onclick="triggerHaptic(); refreshPage()" title="Refresh">
                    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                </button>
                <button class="nav-btn text-[#ff9933]" onclick="triggerHaptic(); goHome()" title="Home Hub">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
                </button>
                
                <img src="https://i.ibb.co/C30Ybjck/PT-20250224-170650-0000.png" class="w-10 h-10 rounded-full ml-2 shadow-md border border-white cursor-pointer hover:scale-105 transition-transform" crossorigin="anonymous" onclick="goHome()">
            </nav>
        </div>

        <div id="homeScreen" class="home-screen custom-scrollbar">
            
            <div class="text-center mb-16 w-full relative z-10">
                <p id="greeting" class="greeting-text">Welcome</p>
                <h1 class="text-4xl md:text-6xl font-black text-slate-800 uppercase tracking-tight">Command <span class="text-[#ff9933]">Center</span></h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl px-4 pb-12 relative z-10">
                
                <div class="pt-card-wrapper">
                    <div class="pt-card" onclick="triggerHaptic(); loadApp('https://sheelu955.github.io/Customer-Gateway/')">
                        <div class="card-icon">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        </div>
                        <h2 class="card-title text-2xl font-black uppercase text-slate-800 mt-2">Customer Vault</h2>
                        <p class="card-subtitle text-[11px] text-slate-500 font-bold uppercase tracking-[3px]">Billing & Receipts</p>
                    </div>
                </div>

                <div class="pt-card-wrapper">
                    <div class="pt-card" onclick="triggerHaptic(); loadApp('https://sheelu955.github.io/CMS-COMPLAINT-MANAGEMENT-SYSTEM/')">
                        <div class="card-icon" style="background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 15px 35px rgba(239, 68, 68, 0.4);">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                        </div>
                        <h2 class="card-title text-2xl font-black uppercase text-slate-800 mt-2">CMS Portal</h2>
                        <p class="card-subtitle text-[11px] text-slate-500 font-bold uppercase tracking-[3px]">Help & Support</p>
                    </div>
                </div>

                <div class="pt-card-wrapper">
                    <div class="pt-card" onclick="triggerHaptic(); loadApp('https://sheelu955.github.io/AI/')">
                        <div class="card-icon" style="background: linear-gradient(135deg, #10b981, #047857); box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                        </div>
                        <h2 class="card-title text-2xl font-black uppercase text-slate-800 mt-2">Gomini AI</h2>
                        <p class="card-subtitle text-[11px] text-slate-500 font-bold uppercase tracking-[3px]">Smart Assistant</p>
                    </div>
                </div>

            </div>
        </div>

        <iframe id="browserFrame" name="browserFrame"></iframe>
    </div>

    <script>
        // 🕰️ LIVE CLOCK & SMART GREETING
        function updateTime() {
            const now = new Date();
            let hh = now.getHours();
            let mm = now.getMinutes();
            let ampm = hh >= 12 ? 'PM' : 'AM';
            hh = hh % 12 || 12;
            document.getElementById('liveClock').innerText = `${hh}:${mm < 10 ? '0'+mm : mm} ${ampm}`;
        }
        setInterval(updateTime, 1000); updateTime();

        function setGreeting() {
            const hr = new Date().getHours();
            let txt = "नमस्ते! पटेल ट्रेडर्स में आपका स्वागत है";
            if (hr >= 5 && hr < 12) txt = "शुभ प्रभात (Good Morning)";
            else if (hr >= 12 && hr < 17) txt = "शुभ दोपहर (Good Afternoon)";
            else if (hr >= 17 && hr < 21) txt = "शुभ संध्या (Good Evening)";
            else txt = "शुभ रात्रि (Good Night)";
            document.getElementById('greeting').innerText = txt;
        }
        setGreeting();

        // 📳 HAPTIC FEEDBACK (Mobile Vibration)
        function triggerHaptic() {
            if(navigator.vibrate) navigator.vibrate(15);
        }

        // 🖱️ INTELLIGENT CURSOR (PC)
        if (window.matchMedia("(pointer: fine)").matches) {
            const cursor = document.getElementById('custom-cursor');
            const dot = document.getElementById('cursor-dot');
            document.addEventListener('mousemove', (e) => {
                dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
                setTimeout(() => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; }, 50);
            });
            document.addEventListener('mousedown', () => { cursor.style.transform = 'translate(-50%, -50%) scale(0.8)'; cursor.style.borderColor = '#ff4500'; });
            document.addEventListener('mouseup', () => { cursor.style.transform = 'translate(-50%, -50%) scale(1)'; cursor.style.borderColor = 'var(--pt-orange)'; });
        }

        // 🧲 MAGNETIC & GYROSCOPE 3D CARDS
        const cards = document.querySelectorAll('.pt-card');
        
        // PC: Mouse Move
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                
                // Glare position
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
                
                // 3D Tilt Logic
                const centerX = rect.width / 2; const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -12; // Max 12 deg tilt
                const rotateY = ((x - centerX) / centerX) * 12;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                
                // Magnetic Pull (Cursor Hover)
                if(window.matchMedia("(pointer: fine)").matches) {
                    const cursor = document.getElementById('custom-cursor');
                    cursor.style.width = '60px'; cursor.style.height = '60px'; cursor.style.background = 'rgba(255,123,0,0.1)';
                }
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                if(window.matchMedia("(pointer: fine)").matches) {
                    const cursor = document.getElementById('custom-cursor');
                    cursor.style.width = '30px'; cursor.style.height = '30px'; cursor.style.background = 'transparent';
                }
            });
        });

        // Mobile: Gyroscope 3D Tilt
        if(window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                const beta = Math.min(Math.max(e.beta, -30), 30); // Front-back tilt
                const gamma = Math.min(Math.max(e.gamma, -30), 30); // Left-right tilt
                cards.forEach(card => {
                    // Reduce intensity for mobile
                    const rotateX = beta * 0.5; 
                    const rotateY = gamma * -0.5;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                });
            });
        }

        // 🚀 BOOT SEQUENCE & CACHE
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('pt_os_matrix_active') === 'true') {
                document.getElementById('view-welcome').style.display = 'none';
                document.getElementById('view-main').style.display = 'flex';
                const lastApp = sessionStorage.getItem('pt_os_active_app');
                if (lastApp && lastApp !== 'home') loadApp(lastApp, true);
            }
        });

        function enterSystem() {
            triggerHaptic();
            const wel = document.getElementById('view-welcome');
            wel.style.transform = 'scale(1.2)'; wel.style.opacity = '0';
            setTimeout(() => {
                localStorage.setItem('pt_os_matrix_active', 'true');
                wel.style.display = 'none';
                document.getElementById('view-main').style.display = 'flex';
            }, 800);
        }

        // 🌐 OS ENGINE (IFRAME CONTROLS)
        let historyStack = []; let currentIdx = -1;
        const frame = document.getElementById('browserFrame');
        const homeScreen = document.getElementById('homeScreen');
        const loadingBar = document.getElementById('loadingBar');

        function fireLaser() {
            loadingBar.style.opacity = '1'; loadingBar.style.width = '0%';
            setTimeout(() => loadingBar.style.width = '40%', 100);
            setTimeout(() => loadingBar.style.width = '85%', 500);
            setTimeout(() => { 
                loadingBar.style.width = '100%'; 
                setTimeout(() => { loadingBar.style.opacity = '0'; setTimeout(()=>loadingBar.style.width='0%', 300); }, 300);
            }, 900);
        }

        function loadApp(url, isHistoryNav = false) {
            fireLaser();
            homeScreen.style.transform = 'scale(0.95)'; homeScreen.style.opacity = '0';
            
            setTimeout(() => {
                homeScreen.style.display = 'none';
                frame.style.display = 'block';
                frame.style.opacity = '0';
                frame.src = url;
                setTimeout(() => frame.style.opacity = '1', 200);
            }, 300);
            
            sessionStorage.setItem('pt_os_active_app', url);
            if (!isHistoryNav) {
                historyStack = historyStack.slice(0, currentIdx + 1);
                historyStack.push(url); currentIdx++;
            }
        }

        function goHome() {
            fireLaser();
            frame.style.opacity = '0';
            setTimeout(() => {
                frame.style.display = 'none'; frame.src = '';
                homeScreen.style.display = 'flex';
                // Reset animation
                homeScreen.style.transform = 'scale(0.95)'; homeScreen.style.opacity = '0';
                setTimeout(() => { homeScreen.style.transform = 'scale(1)'; homeScreen.style.opacity = '1'; }, 50);
            }, 300);
            sessionStorage.setItem('pt_os_active_app', 'home');
            historyStack = historyStack.slice(0, currentIdx + 1);
            historyStack.push('home'); currentIdx++;
        }

        function goBack() {
            if (currentIdx > 0) {
                currentIdx--; let prevUrl = historyStack[currentIdx];
                if (prevUrl === 'home') goHome(); else loadApp(prevUrl, true);
            }
        }

        function goForward() {
            if (currentIdx < historyStack.length - 1) {
                currentIdx++; let nextUrl = historyStack[currentIdx];
                if (nextUrl === 'home') goHome(); else loadApp(nextUrl, true);
            }
        }

        function refreshPage() {
            if (frame.style.display === 'block') {
                fireLaser(); frame.style.opacity = '0';
                setTimeout(() => { let c = frame.src; frame.src = c; frame.style.opacity = '1'; }, 300);
            }
        }
    </script>
</body>
</html>
