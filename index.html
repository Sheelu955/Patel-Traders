<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT OS | Ultra Premium Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800;900&display=swap');
        
        :root { 
            --pt-orange: #ff7b00; 
            --pt-gold: #ffb703;
            --pt-magenta: #e81cff;
            --bg-glass: rgba(255, 255, 255, 0.75);
            --surface: #f8fafc;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 123, 0, 0.4); border-radius: 10px; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--surface); 
            color: #0f172a; 
            margin: 0; 
            overflow-x: hidden; 
            overflow-y: auto; 
            min-height: 100vh;
            width: 100vw;
        }

        /* 🌌 LIQUID AURORA BACKGROUND */
        .aurora-container {
            position: fixed; inset: 0; z-index: -2;
            overflow: hidden; background: #ffffff;
            filter: blur(80px);
        }
        .aurora-blob {
            position: absolute; border-radius: 50%;
            animation: flow 20s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
            mix-blend-mode: multiply; opacity: 0.4;
        }
        .blob-1 { width: 60vw; height: 60vw; background: var(--pt-orange); top: -20%; left: -10%; }
        .blob-2 { width: 50vw; height: 50vw; background: var(--pt-gold); bottom: -10%; right: -20%; }
        .blob-3 { width: 45vw; height: 45vw; background: var(--pt-magenta); top: 30%; left: 40%; opacity: 0.2; }
        
        .mesh-overlay {
            position: fixed; inset: 0; z-index: -1; opacity: 0.3;
            background-image: radial-gradient(#000000 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* 🚀🚀 EXTREME ANIMATION KEYFRAMES 🚀🚀 */
        @keyframes flow {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(10%, 15%) scale(1.2) rotate(180deg); }
            100% { transform: translate(-10%, -5%) scale(0.9) rotate(360deg); }
        }
        @keyframes floatDrop {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        @keyframes shimmerSweep {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }
        @keyframes fadePopStagger {
            0% { opacity: 0; transform: translateY(50px) scale(0.8); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideBounce {
            0% { transform: translateY(-100px); opacity: 0; }
            60% { transform: translateY(20px); opacity: 1; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes spinSlow { 
            100% { transform: rotate(360deg); } 
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes popModal { 
            0% { transform: scale(0.6) translateY(50px); opacity: 0; } 
            100% { transform: scale(1) translateY(0); opacity: 1; } 
        }

        /* ---------------- WELCOME SCREEN ANIMATIONS ---------------- */
        .welcome-screen { 
            position: fixed; inset: 0; z-index: 11000;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(40px) saturate(200%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; 
            transition: all 1s cubic-bezier(0.85, 0, 0.15, 1);
        }
        
        /* Floating & Spinning Ring on Welcome Logo */
        #view-welcome .relative.inline-block {
            animation: floatDrop 4s infinite ease-in-out;
        }
        #view-welcome .relative.inline-block::before {
            content: ''; position: absolute; inset: -20px;
            border: 3px dashed rgba(255, 153, 51, 0.5);
            border-radius: 50%; pointer-events: none;
            animation: spinSlow 12s linear infinite;
        }

        /* Animated Text Gradient */
        .welcome-screen h1, #homeScreen h1 {
            background: linear-gradient(270deg, #0f172a, var(--pt-orange), var(--pt-magenta), #0f172a);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s ease infinite;
        }

        .btn-enter { 
            background: linear-gradient(135deg, var(--pt-orange), #ff4500); 
            color: #ffffff; font-weight: 900; text-transform: uppercase; border-radius: 50px; 
            padding: 18px 50px; cursor: pointer; border: none; 
            box-shadow: 0 10px 40px rgba(255, 123, 0, 0.4); 
            transition: all 0.4s; letter-spacing: 4px; font-size: 13px; margin-top: 40px;
            position: relative; overflow: hidden;
        }
        .btn-enter::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); animation: shimmerSweep 3s infinite;
        }
        .btn-enter:hover { transform: scale(1.05); box-shadow: 0 15px 50px rgba(255, 123, 0, 0.6); }

        /* ---------------- MAIN HUB ANIMATIONS ---------------- */
        
        /* Bouncing Dynamic Island */
        .dynamic-island-wrapper {
            position: sticky; top: 25px; margin-bottom: -60px;
            display: flex; justify-content: center; z-index: 100;
            animation: slideBounce 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .dynamic-island {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 1);
            padding: 8px 20px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
        }

        .home-screen {
            display: flex; flex-direction: column; align-items: center; 
            padding: 120px 20px 40px 20px; min-height: 100vh; position: relative; z-index: 10;
        }

        /* Staggered Pop-In for Cards */
        .pt-card {
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 35px;
            padding: 40px 25px; text-align: center; cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            width: 100%; max-width: 320px;
            position: relative; overflow: hidden;
            
            /* The Pop-in animation */
            opacity: 0;
            animation: fadePopStagger 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* Stagger Delays */
        .grid > div:nth-child(1) .pt-card { animation-delay: 0.2s; }
        .grid > div:nth-child(2) .pt-card { animation-delay: 0.4s; }
        .grid > div:nth-child(3) .pt-card { animation-delay: 0.6s; }

        /* Card Shimmer & Hover */
        .pt-card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.8) 50%, transparent 80%);
            transform: skewX(-20deg); width: 200%; pointer-events: none;
            animation: shimmerSweep 6s infinite;
        }
        .pt-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 30px 60px rgba(255, 123, 0, 0.15); border-color: var(--pt-orange); }

        /* Continuous Floating Icons inside Cards */
        .card-icon {
            width: 70px; height: 70px; border-radius: 22px;
            background: linear-gradient(135deg, var(--pt-orange), #ff4500);
            display: flex; align-items: center; justify-content: center; color: white;
            box-shadow: 0 15px 35px rgba(255, 123, 0, 0.3);
            animation: floatDrop 4s ease-in-out infinite;
        }

        /* 📜 MODAL STYLES */
        .animate-pop { animation: popModal 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .glass-modal {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 153, 51, 0.3); border-radius: 35px;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02), 0 20px 80px rgba(0,0,0,0.9);
            color: white; position: relative; overflow: hidden;
        }
        /* Modal Shimmer Effect */
        .glass-modal::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,153,51,0.1) 0%, transparent 60%);
            animation: spinSlow 20s linear infinite; pointer-events: none;
        }

        .contact-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 16px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 12px; transition: all 0.3s; position: relative; z-index: 10;
        }
        .contact-box:hover { background: rgba(255, 153, 51, 0.1); border-color: rgba(255, 153, 51, 0.3); transform: scale(1.03); }

        #view-main { display: none; flex-direction: column; width: 100vw; }
        
        /* Footer Animation */
        footer { opacity: 0; animation: fadePopStagger 1s ease-out 0.8s forwards; }
    </style>
</head>
<body>

    <div class="aurora-container">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>
    <div class="mesh-overlay"></div>

    <div id="universal-modal" class="fixed inset-0 bg-black/80 backdrop-blur-2xl z-[99999] hidden flex-col items-center justify-center p-4 transition-opacity">
        <div class="glass-modal p-8 max-w-sm w-full text-center animate-pop" style="max-height: 90vh; display: flex; flex-direction: column;">
            
            <div id="um-icon" class="mb-4 relative z-10"></div>
            <h2 id="um-title" class="text-2xl font-black uppercase tracking-widest mb-6 text-[#ff9933] relative z-10">Title</h2>

                <img src="https://i.ibb.co/C30Ybjck/PT-20250224-170650-0000.png" class="w-36 mx-auto rounded-[45px] shadow-2xl relative z-10 border-2 border-white/80" crossorigin="anonymous">
            </div>
            <h4 class="font-black uppercase tracking-[10px] text-[10px] mb-3 text-slate-500">System OS Initialized</h4>

    <div id="view-main">

            </nav>
        </div>

        <div id="homeScreen" class="home-screen">
            
            <div class="text-center mb-12">
                <p id="greeting" class="text-[12px] font-black text-[#ff9933] uppercase tracking-[6px] mb-2">Welcome</p>
                <h1 class="text-4xl md:text-5xl font-black text-slate-800 uppercase tracking-tight">Main <span class="text-[#ff9933]">Hub</span></h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl px-4">
                
                <div>
                    <div class="pt-card" onclick="launchApp('https://sheelu955.github.io/Customer-Gateway/')">
                        <div class="card-icon">
                            <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>

                        <h2 class="text-xl font-black uppercase text-slate-800">Customer Vault</h2>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[2px]">Billing & Receipts</p>
                    </div>
                </div>

                <div>
                    <div class="pt-card" onclick="launchApp('https://sheelu955.github.io/CMS-COMPLAINT-MANAGEMENT-SYSTEM/')">
                        <div class="card-icon" style="background: linear-gradient(135deg, #ef4444, #b91c1c);">
                            <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>

    <script>
        // 🕰️ CLOCK
        function updateTime() {
            const now = new Date();
            let hh = now.getHours(); let mm = now.getMinutes();
            let ampm = hh >= 12 ? 'PM' : 'AM';
            hh = hh % 12 || 12;
            document.getElementById('liveClock').innerText = `${hh}:${mm < 10 ? '0'+mm : mm} ${ampm}`;
        }
        setInterval(updateTime, 1000); updateTime();

        // 🚀 BOOT & CACHE
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('pt_os_active') === 'true') {
                document.getElementById('view-welcome').style.display = 'none';
                document.getElementById('view-main').style.display = 'flex';
            }
        });

        function enterSystem() {
            if(navigator.vibrate) navigator.vibrate(20);
            const wel = document.getElementById('view-welcome');
            wel.style.opacity = '0';
            setTimeout(() => {
                localStorage.setItem('pt_os_active', 'true');
                wel.style.display = 'none';
                document.getElementById('view-main').style.display = 'flex';
            }, 500);
        }

        // 🌐 APP LAUNCHER
        function launchApp(url) {
            if(navigator.vibrate) navigator.vibrate(10);
            window.location.href = url;
        }

        // 📜 UNIVERSAL MODAL LOGIC (About, Terms, Privacy)
        const modalData = {
            'about': {
                title: "Patel Traders",
                icon: `<div style="animation: floatDrop 3s infinite ease-in-out;"><img src="https://i.ibb.co/C30Ybjck/PT-20250224-170650-0000.png" class="w-24 h-24 mx-auto rounded-3xl shadow-[0_0_30px_rgba(255,153,51,0.5)] border-2 border-[#ff9933]/50" crossorigin="anonymous"></div>`,
                content: `
                    <div class="text-center mb-6">
                        <p class="text-xs font-black text-[#ff9933] uppercase tracking-[4px]">Premium Furniture Shop</p>
                    </div>
                    <div class="contact-box">
                        <div class="w-10 h-10 rounded-full bg-emerald-500/20 text-emerald-500 flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        </div>
                        <div>
                            <p class="text-[9px] text-white/50 uppercase tracking-widest font-bold">Phone Number</p>
                            <p class="text-sm font-black tracking-widest text-white">+91 9565697314</p>
                        </div>
                    </div>
                    <div class="contact-box">
                        <div class="w-10 h-10 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-[9px] text-white/50 uppercase tracking-widest font-bold">Email Address</p>
                            <p class="text-[11px] font-black tracking-wide text-white truncate">sanjaypatel26110@gmail.com</p>
                        </div>
                    </div>
                `
            },
            'disclaimer': {
                title: "Disclaimer",
                icon: `<div class="w-16 h-16 mx-auto bg-[#ff9933]/20 text-[#ff9933] rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(255,153,51,0.3)]" style="animation: floatDrop 3s infinite ease-in-out;"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>`,
                content: `<p class="mb-4"><strong class="text-[#ff9933]">1. Security:</strong> This unified hub is the property of Patel Traders. Unauthorized duplication is strictly prohibited.</p><p><strong class="text-[#ff9933]">2. Usage:</strong> The system automatically manages portals. Make sure your internet connection is stable for real-time syncing.</p>`

            'terms': {

                content: `<p class="mb-4"><strong class="text-blue-400">1. Validity:</strong> Any invoice or digital receipt generated through these portals is valid only in its original state.</p><p><strong class="text-blue-400">2. Jurisdiction:</strong> All digital and physical trades are subject to the local jurisdiction of Patel Traders.</p>`

            'privacy': {

                content: `<p class="mb-4"><strong class="text-emerald-400">1. Data Storage:</strong> Customer details are securely stored via encrypted Google Cloud integration.</p><p><strong class="text-emerald-400">2. Device Memory:</strong> We use local cache to remember your session and prevent repetitive logins.</p>`
            }
        };

        function openModal(type) {
            if(navigator.vibrate) navigator.vibrate(10);
            const data = modalData[type];
            document.getElementById('um-icon').innerHTML = data.icon;
            document.getElementById('um-title').innerText = data.title;
            document.getElementById('um-content').innerHTML = data.content;
            
            const modal = document.getElementById('universal-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('universal-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.style.display = 'none', 300);
        }
    </script>
</body>
</html>
